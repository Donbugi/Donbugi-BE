spring:
  application:
    name: finEdu

  profiles:
    active: local

  # 데이터소스 (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/finedu
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

# Swagger UI (springdoc-openapi): http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 삼성증권 일간이슈 — POST /api/issue-schedule/import 로 월 1회 수집
issue-calendar:
  samsung-origin: https://www.samsungpop.com
  list-path: /ux/kor/invest/issue/dayDataList.do
  connect-timeout-ms: 15000
  read-timeout-ms: 30000
  max-rows-per-day: 500
  between-day-delay-ms: 400

# 코스피 (네이버 금융 스크랩 → Redis 캐시, 분 단위 갱신에 맞춤)
kospi:
  naver-url: https://finance.naver.com/sise/sise_index.naver?code=KOSPI
  redis-key: market:kospi:now
  cache-ttl-seconds: 60
  connect-timeout-ms: 10000

# 최근 한 달 관심 뉴스(카테고리별 조회 수 Redis + AI 한마디)
news:
  interest:
    redis-prefix: "finEdu:news:interest:"
    timezone: Asia/Seoul
    month-key-ttl-days: 400
    insight-cache-ttl-minutes: 30
    # 예: http://localhost:8000/news/interest-insight  (POST JSON { "topics": [...] } → { "insight": "..." })
    ai-insight-url: ""
    ai-connect-timeout-ms: 5000
    ai-read-timeout-ms: 45000

# 퀴즈
quiz:
  ai-server-url: http://localhost:8000/quiz
  cache-ttl-days: 7
  lock-ttl-seconds: 30
  ai-connect-timeout-ms: 5000
  ai-read-timeout-ms: 60000
  # 과제 정답률·오답노트 (전부 Redis, DB 미사용)
  stats:
    redis-prefix: "finEdu:quiz:stats:"
    timezone: Asia/Seoul
    day-key-ttl-days: 120
    month-key-ttl-days: 800
    wrong-retention-days: 60

# 크롤러
crawler:
  delay-min: 1500
  delay-max: 3000
  categories:
    - name: 금융
      url: "https://news.naver.com/breakingnews/section/101/259"
    - name: 증권
      url: "https://news.naver.com/breakingnews/section/101/258"
    - name: 산업
      url: "https://news.naver.com/breakingnews/section/101/261"
    - name: 부동산
      url: "https://news.naver.com/breakingnews/section/101/260"
    - name: 글로벌경제
      url: "https://news.naver.com/breakingnews/section/101/262"
    - name: 생활경제
      url: "https://news.naver.com/breakingnews/section/101/310"

# 포인트 교환(메일 안내) — 첫 계정 생성 시 지급 포인트, 발신 주소
# spring.mail.host 등을 설정하면 교환 완료 후 JavaMail로 발송합니다. 미설정 시 본문은 로그로만 출력됩니다.
app:
  points:
    timezone: Asia/Seoul
    demo-initial-balance: 10000
    mail-from: "nniij88@gmail.com"
    qr-delivery-days-hint: 3
    # 최근 적립·사용 3건 캐시 (키: {prefix}{userId}, 값: JSON 배열)
    activity-redis-key-prefix: "finEdu:points:activity:"
    activity-cache-ttl-hours: 168