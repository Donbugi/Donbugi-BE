spring:
  application:
    name: finEdu

  profiles:
    active: local

  # 데이터소스 (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/finedu
    driver-class-name: org.postgresql.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# 크롤러
